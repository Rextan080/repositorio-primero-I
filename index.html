<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Atrapa el cuadrado</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
    }

    h1 {
      margin-top: 20px;
    }

    #info {
      margin: 10px 0;
    }

    #game {
      position: relative;
      width: 400px;
      height: 400px;
      background: #222;
      border: 2px solid #555;
      overflow: hidden;
      cursor: crosshair;
    }

    #target {
      position: absolute;
      width: 40px;
      height: 40px;
      background: #e91e63;
      border-radius: 4px;
      transition: transform 0.05s;
    }

    #startBtn {
      margin-top: 10px;
      padding: 8px 16px;
      border: none;
      background: #4caf50;
      color: #fff;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    #startBtn:disabled {
      background: #555;
      cursor: not-allowed;
    }

    #message {
      margin-top: 10px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h1>Atrapa el cuadrado</h1>
  <div id="info">
    Tiempo: <span id="time">10</span>s |
    Puntos: <span id="score">0</span>
  </div>

  <div id="game">
    <div id="target"></div>
  </div>

  <button id="startBtn">Iniciar juego</button>
  <div id="message"></div>

  <script>
    const game = document.getElementById("game");
    const target = document.getElementById("target");
    const timeSpan = document.getElementById("time");
    const scoreSpan = document.getElementById("score");
    const startBtn = document.getElementById("startBtn");
    const message = document.getElementById("message");

    let score = 0;
    let timeLeft = 10;
    let timer = null;
    let playing = false;

    function randomPosition() {
      const gameRect = game.getBoundingClientRect();
      const size = 40;
      const maxX = gameRect.width - size;
      const maxY = gameRect.height - size;
      const x = Math.floor(Math.random() * maxX);
      const y = Math.floor(Math.random() * maxY);
      target.style.transform = `translate(${x}px, ${y}px)`;
    }

    function startGame() {
      score = 0;
      timeLeft = 10;
      scoreSpan.textContent = score;
      timeSpan.textContent = timeLeft;
      message.textContent = "";
      playing = true;
      startBtn.disabled = true;
      randomPosition();

      timer = setInterval(() => {
        timeLeft--;
        timeSpan.textContent = timeLeft;
        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      playing = false;
      clearInterval(timer);
      startBtn.disabled = false;
      message.textContent = `¡Fin del juego! Tu puntuación: ${score}`;
    }

    target.addEventListener("click", (e) => {
      if (!playing) return;
      e.stopPropagation();
      score++;
      scoreSpan.textContent = score;
      randomPosition();
    });

    game.addEventListener("click", () => {
      if (!playing) return;
      // Penalización opcional si haces clic fuera
      if (score > 0) {
        score--;
        scoreSpan.textContent = score;
      }
    });

    startBtn.addEventListener("click", startGame);

    // Posición inicial
    randomPosition();
  </script>
</body>
</html>
